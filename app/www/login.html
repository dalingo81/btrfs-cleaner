<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BtrFS Cleaner - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;
  display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;
  padding:40px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
h1{color:#e2e8f0;font-size:24px;margin-bottom:8px;text-align:center}
.sub{color:#94a3b8;font-size:13px;text-align:center;margin-bottom:28px}
label{color:#cbd5e1;font-size:13px;margin-bottom:4px;display:block}
input{width:100%;padding:12px 14px;border:1px solid #475569;border-radius:10px;
  background:#0f172a;color:#e2e8f0;font-size:15px;margin-bottom:16px;outline:none}
input:focus{border-color:#3b82f6}
.btn{width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:15px;
  font-weight:600;cursor:pointer}.btn:hover{opacity:.9}
.error{background:#7f1d1d;color:#fca5a5;padding:10px 14px;border-radius:8px;
  margin-bottom:16px;font-size:13px}
</style></head>
<body>
<div class="card">
  <h1>&#x1F5C4;&#xFE0F; BtrFS Cleaner</h1>
  <p class="sub">使用服务器本地用户登录</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>用户名</label>
    <input type="text" name="username" autocomplete="username" required autofocus>
    <label>密码</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button type="submit" class="btn">登 录</button>
  </form>
</div>
</body></html>
